<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Logistics Game</title>
  <link rel="stylesheet" href="style.css" />
  <script>
  // Minimal Streamlit Component API — no CDN dependency
  (function () {
    function send(type, data) {
      window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), '*');
    }
    window.Streamlit = {
      RENDER_EVENT: 'streamlit:render',
      setComponentReady: function () { send('streamlit:componentReady', { apiVersion: 1 }); },
      setComponentValue: function (value) { send('streamlit:setComponentValue', { value: value, dataType: 'json' }); },
      setFrameHeight: function (height) {
        if (height == null) height = document.documentElement.scrollHeight;
        send('streamlit:setFrameHeight', { height: height });
      },
    };
    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'streamlit:render') {
        window.dispatchEvent(new CustomEvent('streamlit:render', { detail: e.data }));
      }
    });
  })();
  </script>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-title">🌐 Global Logistics</div>
    <div class="header-stats">
      <span class="stat-box">💰 Budget: <strong id="hud-budget">$500,000</strong></span>
      <span class="stat-box">📦 Output: <strong id="hud-output">— units</strong></span>
      <span class="stat-box">📈 Profit: <strong id="hud-profit">$0</strong></span>
    </div>
    <button id="btn-leaderboard" class="lb-header-btn">🏆 Leaderboard</button>
  </header>

  <!-- ── Map (full screen) ──────────────────────────────────────────────── -->
  <div id="map-container">
    <img id="map-img"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1280px-World_map_-_low_resolution.svg.png"
      alt="World Map" />
    <div id="map-pins"></div>
    <svg id="route-svg" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- Stage announcement banner -->
    <div id="announcement">
      <div id="announcement-text"></div>
    </div>
  </div>

  <!-- ── Region popup ──────────────────────────────────────────────────── -->
  <div id="region-popup" class="hidden">
    <div id="popup-header">
      <span id="popup-region-name"></span>
      <button id="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div id="popup-region-stats">
      <div class="popup-stat"><span>📦 Demand</span><strong id="popup-demand"></strong></div>
      <div class="popup-stat"><span>💲 Market Price</span><strong id="popup-price"></strong></div>
    </div>
    <div id="popup-facility-info"></div>
    <div id="popup-actions"></div>
  </div>

  <!-- ── Result overlay ────────────────────────────────────────────────── -->
  <div id="result-overlay" class="hidden">
    <div id="result-box">
      <div id="result-title">Simulation Results</div>
      <div id="result-rows"></div>
      <div id="submit-section">
        <div id="submit-fields">
          <input id="student-id"  type="text" placeholder="학번 (Student ID)" maxlength="20" />
          <input id="player-name" type="text" placeholder="이름 (Name)"        maxlength="40" />
        </div>
        <button id="btn-submit-score">🏆 Submit Score to Leaderboard</button>
      </div>
      <div id="rank-result" style="display:none;margin-top:14px;text-align:center;line-height:1.7">
        <div id="rank-text"></div>
      </div>
      <button id="btn-restart">🔄 Play Again</button>
    </div>
  </div>


  <!-- ── Bottom toolbar (4 buttons) ───────────────────────────────────── -->
  <div id="toolbar">
    <button class="tool-btn" id="btn-mine"    data-mode="mine">
      <span class="tool-emoji">⛏️</span>
      <span class="tool-label">Mine</span>
      <span class="tool-cost" id="cost-mine"></span>
    </button>
    <button class="tool-btn" id="btn-factory" data-mode="factory">
      <span class="tool-emoji">🏭</span>
      <span class="tool-label">Factory</span>
      <span class="tool-cost" id="cost-factory"></span>
    </button>
    <button class="tool-btn" id="btn-salesHub" data-mode="salesHub">
      <span class="tool-emoji">🏪</span>
      <span class="tool-label">Sales Hub</span>
      <span class="tool-cost" id="cost-salesHub"></span>
    </button>
    <button class="tool-btn simulate-btn" id="btn-simulate">
      <span class="tool-emoji">▶</span>
      <span class="tool-label">Simulate</span>
    </button>
  </div>

  <!-- ── Toast ─────────────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
